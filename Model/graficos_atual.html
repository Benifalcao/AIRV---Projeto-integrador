<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIVR - Consumo Semanal</title>
    <link rel="stylesheet" href="/View/graficos1.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <main class="main-card">
        <header class="card-header">
            <a href="/Model/pagprincipal.html" class="back-link">
                <span class="arrow-icon"></span>
            </a>
            <div class="logo-group">
                <div class="logo-avatar">
                    <img src="/View/_ (7).jpeg" alt="AIVR Logo">
                </div>
                <h1 class="brand-name">AIVR</h1>
            </div>
            <div class="header-spacer"></div>
        </header>

        <div id="alert-consumption" class="alert-box hidden">
            ⚠️ <strong>ALERTA:</strong> Consumo elevado detectado (Acima de 100 m³)!
        </div>

        <section class="charts-container">
            <div class="chart-wrapper"><canvas id="chart-seg"></canvas></div>
            <div class="chart-wrapper"><canvas id="chart-ter"></canvas></div>
            <div class="chart-wrapper"><canvas id="chart-qua"></canvas></div>
            <div class="chart-wrapper"><canvas id="chart-qui"></canvas></div>
            <div class="chart-wrapper"><canvas id="chart-sex"></canvas></div>
            <div class="chart-wrapper"><canvas id="chart-sab"></canvas></div>
            <div class="chart-wrapper"><canvas id="chart-dom"></canvas></div>
        </section>

        <footer class="action-buttons">
            <a href="/Model/graficos_atual.html" class="btn">Registro Diário</a>
        </footer>
    </main>

    <script src="/View/graficos1.js"></script>
</body>
</html>
