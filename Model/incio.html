<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card AIVR</title>
    <link rel="stylesheet" href="/View/inicio.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="avatar">
                <img src="/View/_ (7).jpeg" alt="AIVR Logo">
            </div>
            <h1 class="title">AIVR</h1>
           <a href="/Model/pagprincipal.html" class="button">Entrar</a>
            </div>
        </div>
    </div>

<script>
    // Seleciona todos os links da página
    const links = document.querySelectorAll('a');

    links.forEach(link => {
        link.addEventListener('click', e => {
            // Verifica se o link é interno (não abre em nova aba)
            if (link.hostname === window.location.hostname) {
                e.preventDefault(); // Interrompe o clique por um segundo
                const destination = link.href;

                // Aplica um efeito de sumir no corpo da página
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.4s ease';

                // Após 400ms (tempo da transição), ele muda de página
                setTimeout(() => {
                    window.location.href = destination;
                }, 400);
            }
        });
    });
</script>

</body>
</html>
